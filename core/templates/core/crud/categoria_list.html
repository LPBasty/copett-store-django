{% extends 'core/base.html' %}

{% block content %}
<div class="container py-5" style="min-height: 70vh;">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-gold fw-bold">Gestión de Categorías</h2>
        <a href="{% url 'categoria_crear' %}" class="btn bg-gold fw-bold text-dark rounded-pill">➕ Nueva Categoría</a>
    </div>

    <div class="card bg-dark border-gold rounded-4">
        <div class="card-body">
            <table class="table table-dark table-hover align-middle">
                <thead>
                    <tr>
                        <th class="text-gold">ID</th>
                        <th class="text-gold">Nombre</th>
                        <th class="text-gold">Descripción</th>
                        <th class="text-gold text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    {% for cat in categorias %}
                    <tr>
                        <td>{{ cat.id }}</td>
                        <td class="fw-bold">{{ cat.nombre }}</td>
                        <td>{{ cat.descripcion|truncatechars:50 }}</td>
                        <td class="text-center">
                            <a href="{% url 'categoria_editar' cat.id %}" class="btn btn-sm btn-outline-warning rounded-circle" title="Editar">✏️</a>
                            <a href="{% url 'categoria_eliminar' cat.id %}" class="btn btn-sm btn-outline-danger rounded-circle" title="Eliminar">🗑️</a>
                        </td>
                    </tr>
                    {% empty %}
                    <tr>
                        <td colspan="4" class="text-center text-secondary py-4">No hay categorías registradas.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
