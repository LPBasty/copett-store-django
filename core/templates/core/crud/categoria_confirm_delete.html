{% extends 'core/base.html' %}

{% block content %}
<div class="container py-5 d-flex justify-content-center" style="min-height: 70vh;">
    <div class="card bg-dark border-danger rounded-4 p-4 text-center shadow-lg" style="max-width: 500px; width: 100%;">
        <div class="display-1 mb-3">⚠️</div>
        <h3 class="text-danger fw-bold mb-3">¿Eliminar Categoría?</h3>
        <p class="text-light mb-4">Estás a punto de borrar la categoría <strong>"{{ object.nombre }}"</strong>. Esta acción no se puede deshacer.</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="d-flex justify-content-center gap-3">
                <a href="{% url 'categoria_list' %}" class="btn btn-outline-secondary rounded-pill fw-bold px-4">Cancelar</a>
                <button type="submit" class="btn btn-danger rounded-pill fw-bold px-4">Sí, Eliminar</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
